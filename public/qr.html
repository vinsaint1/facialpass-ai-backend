<!DOCTYPE html>
<html>
<head>
    <title>FacialPass AI — Expo QR Code</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #000000;
            color: #ffffff;
        }
        .container {
            background: #111111;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #1e1e1e;
            text-align: center;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #ffffff; margin-top: 0; font-size: 24px; font-weight: 800; }
        .url { font-family: monospace; color: #4caf50; font-size: 1.1em; margin: 24px 0; background: #1a2e1a; padding: 12px; border-radius: 8px; word-break: break-all; border: 1px solid #233827; }
        p { color: #888888; font-size: 14px; line-height: 1.5; }
        .qr-wrapper {
            background: white;
            padding: 16px;
            border-radius: 16px;
            display: inline-block;
            margin: 16px 0;
        }
        .qr-wrapper img {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Scan to Open mobile-app on Expo Go</h1>
        <div class="qr-wrapper">
            <!-- Using api.qrserver.com to generate a clean QR code -->
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=exp%3A%2F%2F192.168.1.70%3A8081" alt="Expo QR Code" />
        </div>
        <div class="url">exp://192.168.1.70:8081</div>
        <p>1. Open the <strong>Expo Go</strong> app on your Android or iOS device.</p>
        <p>2. Scan this QR code (using the Expo Go scanner or your system camera).</p>
        <p>3. Ensure your phone and computer are on the same Wi-Fi network (<strong>lan</strong>) and any VPNs are disabled.</p>
    </div>
</body>
</html>
